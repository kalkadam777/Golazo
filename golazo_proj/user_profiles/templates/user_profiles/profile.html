{% extends 'base.html' %}
{% block title %}Profile{% endblock %}

{% block content %}
<h1>{{ user.username }}'s Profile</h1>
<p>Email: {{ user.email }}</p>

{% if is_journalist %}
    <a href="{% url 'create_article' %}" class="btn btn-primary">Create Article</a>
{% else %}
    <p>You are not a journalist and cannot create articles.</p>
{% endif %}
{% endblock %}
